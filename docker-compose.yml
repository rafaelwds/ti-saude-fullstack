services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ti_saude_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    networks:
      - ti_saude_network

  nginx:
    image: nginx:alpine
    container_name: ti_saude_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ti_saude_network

  db:
    image: mysql:8.0
    container_name: ti_saude_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ti_saude
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ti_saude_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ti_saude_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - ti_saude_network

networks:
  ti_saude_network:

volumes:
  dbdata:
